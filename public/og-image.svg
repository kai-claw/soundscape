<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ffff00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Waveform lines -->
  <g filter="url(#glow)" opacity="0.6">
    <path d="M 0 315 Q 100 250, 200 315 T 400 315 T 600 315 T 800 315 T 1000 315 T 1200 315" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.4"/>
    <path d="M 0 315 Q 150 200, 300 315 T 600 315 T 900 315 T 1200 315" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3"/>
    <path d="M 0 315 Q 200 380, 400 315 T 800 315 T 1200 315" fill="none" stroke="#ffff00" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Frequency bars -->
  <g filter="url(#glow)" opacity="0.5">
    <rect x="200" y="350" width="12" height="60" rx="2" fill="#ff00ff" opacity="0.7"/>
    <rect x="220" y="330" width="12" height="80" rx="2" fill="#cc00ff" opacity="0.7"/>
    <rect x="240" y="310" width="12" height="100" rx="2" fill="#8800ff" opacity="0.8"/>
    <rect x="260" y="290" width="12" height="120" rx="2" fill="#4400ff" opacity="0.8"/>
    <rect x="280" y="270" width="12" height="140" rx="2" fill="#0044ff" opacity="0.9"/>
    <rect x="300" y="300" width="12" height="110" rx="2" fill="#0088ff" opacity="0.8"/>
    <rect x="320" y="320" width="12" height="90" rx="2" fill="#00ccff" opacity="0.7"/>
    <rect x="340" y="340" width="12" height="70" rx="2" fill="#00ffff" opacity="0.6"/>
  </g>
  <!-- Particles -->
  <g filter="url(#bigGlow)" opacity="0.6">
    <circle cx="700" cy="250" r="3" fill="#ff00ff"/>
    <circle cx="750" cy="280" r="2" fill="#00ffff"/>
    <circle cx="800" cy="230" r="4" fill="#ffff00"/>
    <circle cx="850" cy="300" r="2.5" fill="#ff3366"/>
    <circle cx="900" cy="260" r="3.5" fill="#ff00ff"/>
    <circle cx="950" cy="290" r="2" fill="#00ffff"/>
    <circle cx="680" cy="320" r="2.5" fill="#ffff00"/>
    <circle cx="820" cy="340" r="3" fill="#ff3366"/>
    <circle cx="770" cy="200" r="2" fill="#ff00ff"/>
    <circle cx="870" cy="220" r="3" fill="#00ffff"/>
  </g>
  <!-- Title -->
  <text x="600" y="200" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#wave)" text-anchor="middle" filter="url(#bigGlow)">SoundScape</text>
  <text x="600" y="250" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.8">Audio-Reactive 3D Visualizer</text>
  <!-- Mode labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ffffff" opacity="0.6" text-anchor="middle">
    <text x="300" y="520">🌊 Waveform</text>
    <text x="450" y="520">📊 Frequency</text>
    <text x="600" y="520">✨ Particles</text>
    <text x="750" y="520">🔮 Kaleidoscope</text>
    <text x="900" y="520">🕳️ Tunnel</text>
  </g>
</svg>
