<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoundScape — Page Not Found</title>
  <meta name="theme-color" content="#0a0014"/>
  <noscript><meta http-equiv="refresh" content="0;url=/soundscape/"/></noscript>
  <script>
    // SPA redirect for GitHub Pages
    const path = window.location.pathname;
    if (path !== '/soundscape/' && path !== '/soundscape/index.html') {
      window.location.replace('/soundscape/' + window.location.search + window.location.hash);
    }
  </script>
  <style>
    body { margin: 0; background: #0a0014; color: #fff; font-family: Inter, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    p { opacity: 0.7; }
    a { color: #ff00ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div>
    <h1>🎵</h1>
    <p>Page not found</p>
    <a href="/soundscape/">Return to SoundScape</a>
  </div>
</body>
</html>
